<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>i-Reserve NC — Kamerbordjes</title>
    <link rel="stylesheet" href="../../shared/ireserve.css"/>
    <!--suppress CssUnusedSymbol -->
    <style>
        .nc-rooms {
            flex: 1 1 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(28vw, 1fr));
            gap: 2.2vh 2vw;
            align-content: stretch;
        }
        .room {
            --c: var(--ir-primary);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: var(--ir-radius);
            padding: 2.6vh 2vw;
            color: #fff;
            background: var(--c);
            box-shadow: 0 1.2vh 3vh rgba(0,0,0,.12);
            overflow: hidden;
        }
        .room .room-name { font-size: 3vh; font-weight: 700; }
        .room .room-state {
            margin-top: auto;
            font-size: 2.1vh;
            opacity: .95;
        }
        .room .room-activity { font-size: 2.6vh; font-weight: 600; margin-top: 1vh; }
        .room .room-time { font-variant-numeric: tabular-nums; opacity: .9; }

        /* "Nu bezig" badge (tekst komt uit i18n, via een element) */
        .room .now-badge {
            position: absolute; top: 2vh; right: 2vw;
            background: var(--ir-accent); color: #fff;
            font-size: 1.5vh; font-weight: 700; letter-spacing: 1px;
            padding: .5vh 1vw; border-radius: 999px;
        }
        .room.is-free { background: var(--ir-surface); color: var(--ir-muted); border: 2px dashed var(--ir-line); }
        .room.is-free .room-name { color: var(--ir-ink); }
    </style>
</head>
<body>
    <div class="nc-screen">
        <header class="nc-header">
            <img class="nc-logo" src="../../shared/i-reserve-logo.png" alt="i-Reserve"/>
            <h1 class="nc-title" id="nc-title"></h1>
            <div class="nc-date" id="nc-date"></div>
        </header>

        <main class="nc-body">
            <div class="nc-rooms" id="nc-rooms"></div>
        </main>

        <footer class="nc-footer">
            <span data-i18n="ui.poweredBy">Powered by i-Reserve</span>
        </footer>
    </div>

    <div class="nc-status" id="nc-status" hidden></div>

    <script src="../../shared/ireserve.js"></script>
    <script src="../../shared/i18n.js"></script>
    <script src="../../shared/demo-data.js"></script>
    <script src="config.js"></script>
    <script>
    (function () {
        var cfg = window.NC_CONFIG, map = cfg.columnMap;
        iReserve.initLang(cfg);
        iReserve.applyI18n();
        document.getElementById("nc-title").textContent = iReserve.pick(cfg.title) || "";
        document.getElementById("nc-date").textContent  = iReserve.formatLongDate();

        iReserve.poll(cfg, render);

        // Elke minuut opnieuw renderen zodat "nu bezig" actueel blijft,
        // ook tussen de API-refreshes door.
        var lastRows = [];
        setInterval(function () { render(lastRows); }, 60 * 1000);

        function render(rows) {
            lastRows = rows || [];
            var roomDefs = cfg.rooms && cfg.rooms.length ? cfg.rooms : deriveRooms(lastRows);
            document.getElementById("nc-rooms").innerHTML = roomDefs.map(function (def) {
                var events = lastRows.filter(function (r) {
                    return String(r[map.room]) === def.match;
                }).sort(byTime);

                var current = events.find(function (e) {
                    return iReserve.isNow(e[map.from], e[map.til]);
                });
                var next = !current && events.find(function (e) {
                    return iReserve.shortTime(e[map.from]) >= iReserve.formatClock();
                });

                if (current) {
                    return card(def, "is-busy",
                        '<div class="room-activity">' + iReserve.esc(current[map.activity]) + '</div>' +
                        '<div class="room-time">' + iReserve.esc(iReserve.t("ui.untilTime", { t: iReserve.shortTime(current[map.til]) })) + '</div>');
                }
                if (next) {
                    return card(def, "",
                        '<div class="room-activity">' + iReserve.esc(next[map.activity]) + '</div>' +
                        '<div class="room-time">' + iReserve.esc(iReserve.t("ui.fromTime", { t: iReserve.shortTime(next[map.from]) })) + '</div>');
                }
                return card(def, "is-free", '<div class="room-activity">' + iReserve.t("ui.available") + '</div>');
            }).join("");
        }

        function card(def, cls, inner) {
            var badge = cls.indexOf("is-busy") >= 0
                ? '<span class="now-badge">' + iReserve.t("ui.now") + '</span>' : '';
            return '<div class="room ' + cls + '" style="--c:' + (def.color || 'var(--ir-primary)') + '">' +
                badge +
                '<div class="room-name">' + iReserve.esc(iReserve.pick(def.label) || def.match) + '</div>' +
                '<div class="room-state">' + inner + '</div>' +
            '</div>';
        }

        function byTime(a, b) {
            return iReserve.shortTime(a[map.from]).localeCompare(iReserve.shortTime(b[map.from]));
        }
        var PALETTE = ["#ea72ad", "#3ea992", "#7161a8", "#ea7373", "#72bfd5", "#67b516"];
        function deriveRooms(rows) {
            var seen = {}, out = [];
            rows.forEach(function (r) {
                var name = r[map.room];
                if (name && !seen[name]) {
                    seen[name] = 1;
                    out.push({ match: name, label: name, color: PALETTE[out.length % PALETTE.length] });
                }
            });
            return out;
        }
    })();
    </script>
</body>
</html>
